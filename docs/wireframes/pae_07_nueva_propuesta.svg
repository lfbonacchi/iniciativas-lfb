<svg viewBox="0 0 1060 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svgtitle">
<title id="svgtitle">PAE — Nueva propuesta</title>
<desc>Combo buscar existente o crear nueva iniciativa</desc>
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
    text, tspan { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
  <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06" flood-color="#000"/>
  </filter>
  <filter id="shadow-md" x="-4%" y="-4%" width="108%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08" flood-color="#000"/>
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.04" flood-color="#000"/>
  </filter>
  <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#FAFBFC"/>
  </linearGradient>
  <linearGradient id="blueAccent" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#003DA5" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#003DA5" stop-opacity="0"/>
  </linearGradient>
</defs>
<!-- Background -->
<rect width="1060" height="520" fill="#F7F8FA" rx="0"/>
<!-- Header -->
<rect x="0" y="0" width="1060" height="48" fill="#FFFFFF" filter="url(#shadow-sm)"/>
<line x1="0" y1="48" x2="1060" y2="48" stroke="#E2E5EA" stroke-width="1"/>
<g transform="translate(16,16)">
  <rect x="0" y="-2" width="4" height="16" rx="1" fill="#C8102E"/>
  <text x="8" y="11" font-size="13" font-weight="700" fill="#1A1D23" letter-spacing="-0.3">PAE</text>
  <text x="42" y="11" font-size="10" font-weight="400" fill="#5A6070" letter-spacing="0.2">Gestión de Portfolio</text>
</g>
<text x="200" y="30" font-size="12" font-weight="400" fill="#8B92A0">Propuesta</text>
<text x="269" y="30" font-size="10" fill="#8B92A0" opacity="0.4">›</text>
<text x="290" y="30" font-size="12" font-weight="400" fill="#8B92A0">Dimensionamiento</text>
<text x="408" y="30" font-size="10" fill="#8B92A0" opacity="0.4">›</text>
<text x="410" y="30" font-size="12" font-weight="400" fill="#8B92A0">MVP</text>
<text x="437" y="30" font-size="10" fill="#8B92A0" opacity="0.4">›</text>
<text x="465" y="30" font-size="12" font-weight="400" fill="#8B92A0">Delivery</text>
<!-- Notifications -->
<circle cx="990" cy="24" r="14" fill="transparent" stroke="#E2E5EA" stroke-width="1"/>
<text x="990" y="28" text-anchor="middle" font-size="13" fill="#5A6070">🔔</text>
<circle cx="996" cy="16" r="7" fill="#C8102E"/>
<text x="996" y="19.5" text-anchor="middle" font-size="8" font-weight="600" fill="#FFFFFF">3</text>
<!-- Avatar -->
<circle cx="1032" cy="24" r="14" fill="#C8102E" opacity="0.12"/>
<text x="1032" y="28" text-anchor="middle" font-size="10" font-weight="600" fill="#C8102E">MR</text>
<!-- Sidebar -->
<rect x="0" y="48" width="200" height="472" fill="#FFFFFF"/>
<line x1="200" y1="48" x2="200" y2="520" stroke="#E2E5EA" stroke-width="1"/>
<rect x="16" y="72" width="168" height="36" rx="8" fill="#003DA5"/>
<text x="100" y="94" text-anchor="middle" font-size="12" font-weight="500" fill="#FFFFFF">+ Nueva propuesta</text>
<text x="16" y="124" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="0.8">NAVEGACIÓN</text>
<text x="24" y="152" font-size="13" font-weight="400" fill="#5A6070">Dashboards</text>
<rect x="8" y="170" width="184" height="32" rx="6" fill="#003DA5" opacity="0.06"/>
<rect x="4" y="176" width="3" height="20" rx="1.5" fill="#003DA5"/>
<text x="24" y="188" font-size="13" font-weight="600" fill="#003DA5">Mis iniciativas</text>
<text x="24" y="224" font-size="13" font-weight="400" fill="#5A6070">Gateways</text>
<rect x="16" y="254" width="168" height="32" rx="6" fill="#C8102E" opacity="0.06"/>
<text x="28" y="272" font-size="12" font-weight="500" fill="#C8102E">Aprob. pendientes</text>
<circle cx="170" cy="266" r="9" fill="#C8102E"/>
<text x="170" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">2</text>
<text x="16" y="312" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="0.8">ESTADO</text>
<rect x="16" y="330" width="87.5" height="24" rx="12" fill="#00843D" opacity="0.08"/>
<circle cx="26" cy="342" r="3" fill="#00843D" opacity="0.6"/>
<text x="34" y="346" font-size="10" fill="#00843D" font-weight="500">En progreso</text>
<rect x="109.5" y="330" width="74.5" height="24" rx="12" fill="#C8102E" opacity="0.08"/>
<circle cx="119.5" cy="342" r="3" fill="#C8102E" opacity="0.6"/>
<text x="127.5" y="346" font-size="10" fill="#C8102E" font-weight="500">Pendiente</text>
<rect x="16" y="360" width="61.5" height="24" rx="12" fill="#8B92A0" opacity="0.08"/>
<circle cx="26" cy="372" r="3" fill="#8B92A0" opacity="0.6"/>
<text x="34" y="376" font-size="10" fill="#8B92A0" font-weight="500">Pausada</text>
<text x="224" y="82" font-size="18" font-weight="600" fill="#1A1D23">Nueva propuesta</text>
<text x="224" y="100" font-size="12" fill="#5A6070">Buscá una iniciativa existente o creá una nueva</text>

<!-- Search input -->
<rect x="216" y="116" width="828" height="44" rx="10" fill="#FFFFFF" stroke="#003DA5" stroke-width="1.5"/>
<text x="256" y="143" font-size="13" fill="#1A1D23">optim</text>
<text x="228" y="143" font-size="16" fill="#8B92A0">🔍</text>
<text x="296" y="143" font-size="13" fill="#8B92A0">|</text>

<!-- Results -->
<text x="224" y="180" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="0.8">RESULTADOS EXISTENTES</text>
<rect x="216" y="190" width="828" height="56" rx="8" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1"/>
<text x="232" y="214" font-size="14" font-weight="500" fill="#1A1D23">Optimización de pozo</text>
<text x="232" y="234" font-size="11" fill="#5A6070">PO: J. García | En progreso F1</text>
<rect x="496" y="204" width="70" height="22" rx="11" fill="#003DA5" opacity="0.08"/>
<text x="531" y="219" text-anchor="middle" font-size="10" font-weight="500" fill="#003DA5">Propuesta</text>
<rect x="954" y="206" width="74" height="28" rx="6" fill="#F7F8FA" stroke="#E2E5EA" stroke-width="1"/>
<text x="991" y="224" text-anchor="middle" font-size="11" font-weight="500" fill="#003DA5">Abrir F1</text>
<rect x="216" y="254" width="828" height="56" rx="8" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1"/>
<text x="232" y="278" font-size="14" font-weight="500" fill="#1A1D23">Optimización bombeo zona sur</text>
<text x="232" y="298" font-size="11" fill="#5A6070">PO: F. Álvarez | Gateway 2 pendiente</text>
<rect x="536" y="268" width="112" height="22" rx="11" fill="#003DA5" opacity="0.08"/>
<text x="592" y="283" text-anchor="middle" font-size="10" font-weight="500" fill="#003DA5">Dimensionamiento</text>
<rect x="954" y="270" width="74" height="28" rx="6" fill="#F7F8FA" stroke="#E2E5EA" stroke-width="1"/>
<text x="991" y="288" text-anchor="middle" font-size="11" font-weight="500" fill="#003DA5">Abrir F2</text>
<text x="224" y="334" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="0.8">NO ENCONTRÁS LO QUE BUSCÁS?</text>

<rect x="216" y="344" width="828" height="60" rx="10" fill="#003DA5" opacity="0.03" stroke="#003DA5" stroke-width="1" stroke-dasharray="6,3"/>
<circle cx="244" cy="374" r="16" fill="#003DA5" opacity="0.08"/>
<text x="244" y="380" text-anchor="middle" font-size="18" fill="#003DA5">+</text>
<text x="270" y="368" font-size="14" font-weight="500" fill="#1A1D23">Crear "optim" como nueva iniciativa</text>
<text x="270" y="388" font-size="11" fill="#5A6070">Se crea carpeta en SharePoint y se abre Formulario 1 en blanco</text>
<rect x="964" y="362" width="64" height="28" rx="6" fill="#003DA5"/>
<text x="996" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Crear</text>

<!-- Notes -->
<text x="216" y="428" font-size="11" fill="#8B92A0">Las iniciativas se sincronizan con las carpetas de SharePoint.</text>

<rect x="216" y="444" width="828" height="32" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
<text x="232" y="464" font-size="11" fill="#92400E">Post-MVP: se conecta con nombres de carpetas SharePoint o SAP para autocompletar iniciativas existentes.</text>
</svg>