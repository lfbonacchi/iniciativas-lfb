xt x="232" y="672" font-size="9" fill="#8B92A0">Datos vienen de los formularios de cada etapa</text><rect x="634" y="566" width="410" height="110" rx="10" fill="#FFFFFF" filter="url(#s)"/><text x="650" y="588" font-size="12" font-weight="600" fill="#1A1D23">Indicadores de avance</text><text x="944" y="588" font-size="10" fill="#8B92A0">Posibilidad de graficar</text><text x="650" y="610" font-size="10" fill="#1A1D23">Producción incr.: +11.2K / +15K</text><rect x="650" y="614" width="370" height="8" rx="4" fill="#F7F8FA"/><rect x="650" y="614" width="277" height="8" rx="4" fill="#00843D"/><text x="1026" y="622" font-size="9" font-weight="600" fill="#00843D">75%</text><text x="650" y="636" font-size="10" fill="#1A1D23">Usuarios activos: 28 / 40</text><rect x="650" y="640" width="370" height="8" rx="4" fill="#F7F8FA"/><rect x="650" y="640" width="259" height="8" rx="4" fill="#00843D"/><text x="1026" y="648" font-size="9" font-weight="600" fill="#00843D">70%</text><text x="650" y="662" font-size="10" fill="#1A1D23">Precisión modelo: 78% / 90%</text><rect x="650" y="666" width="370" height="8" rx="4" fill="#F7F8FA"/><rect x="650" y="666" width="321" height="8" rx="4" fill="#00843D"/><text x="1026" y="674" font-size="9" font-weight="600" fill="#00843D">87%</text><text x="650" y="692" font-size="9" fill="#8B92A0">📊 MVP no incluye graficador — posibilidad futura</text><rect x="216" y="690" width="410" height="100" rx="10" fill="#FFFFFF" filter="url(#s)"/><text x="232" y="712" font-size="12" font-weight="600" fill="#1A1D23">Identificación de bloqueantes</text><text x="526" y="712" font-size="10" font-weight="500" fill="#003DA5">+ Agregar bloq.</text><text x="232" y="732" font-size="9" font-weight="600" fill="#8B92A0" letter-spacing="0.3">BLOQUEANTE</text><text x="436" y="732" font-size="9" font-weight="600" fill="#8B92A0" letter-spacing="0.3">INVOLUCRADOS</text><text x="556" y="732" font-size="9" font-weight="600" fill="#8B92A0" letter-spacing="0.3">PRIORIDAD</text><line x1="