idad/oportunidad</text><rect x="736" y="410" width="580" height="20" rx="6" fill="#F7F8FA" stroke="#E2E5EA"/><text x="748" y="424" font-size="10" fill="#8B92A0">Escribí tu feedback...</text><text x="720" y="460" font-size="13" font-weight="600" fill="#1A1D23">Tu decisión</text><rect x="720" y="474" width="84" height="36" rx="8" fill="#00843D"/><text x="762" y="496" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Aprobar</text><rect x="814" y="474" width="92" height="36" rx="8" fill="#003DA5"/><text x="860" y="496" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Feedback</text><rect x="916" y="474" width="68" height="36" rx="8" fill="#F59E0B"/><text x="950" y="496" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Pausa</text><rect x="994" y="474" width="92" height="36" rx="8" fill="#C8102E"/><text x="1040" y="496" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Rechazar</text><rect x="1096" y="474" width="140" height="36" rx="8" fill="#5A6070"/><text x="1166" y="496" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Cambio de área</text><rect x="720" y="530" width="650" height="36" rx="8" fill="#F7F8FA" stroke="#E2E5EA"/><text x="736" y="552" font-size="11" fill="#5A6070">Unanimidad: todos deben aprobar. Si uno da feedback, vuelve al PO y todos re-votan.</text></svg>