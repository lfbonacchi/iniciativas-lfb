<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><title>PAE — Popup Agregar evento</title>
<defs><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');text,tspan{font-family:'Inter',sans-serif;}</style>
<filter id="s" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/></filter></defs>
<rect width="400" height="200" fill="#F7F8FA"/><rect x="10" y="10" width="380" height="180" rx="12" fill="#FFFFFF" filter="url(#s)"/><text x="30" y="40" font-size="14" font-weight="600" fill="#1A1D23">Agregar evento (popup)</text><text x="30" y="68" font-size="11" fill="#5A6070">Nombre del evento:</text><rect x="30" y="74" width="340" height="24" rx="6" fill="#F7F8FA" stroke="#E2E5EA"/><text x="30" y="114" font-size="11" fill="#5A6070">Tipo: ▼ Gate | Sprint Rev | Seg. Q | LTP | Otro...</text><text x="30" y="136" font-size="11" fill="#5A6070">Iniciativa: ▼ (selector)</text><text x="30" y="158" font-size="11" fill="#5A6070">Invitados: ▼ (multi-select usuarios)</text><rect x="290" y="166" width="80" height="28" rx="6" fill="#003DA5"/><text x="330" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Guardar</text><text x="30" y="188" font-size="9" fill="#8B92A0">Se agrega a la lista de próximos eventos</text></svg>