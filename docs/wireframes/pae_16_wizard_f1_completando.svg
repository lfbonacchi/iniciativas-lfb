="10" fill="#FFFFFF" filter="url(#s)"/><circle cx="236" cy="136" r="8" fill="#00843D" opacity="1"/><text x="236" y="140" text-anchor="middle" font-size="9" fill="#FFFFFF">✓</text><text x="252" y="140" font-size="10" font-weight="400" fill="#1A1D23">Info general</text><line x1="236" y1="144" x2="236" y2="160" stroke="#E2E5EA"/><circle cx="236" cy="168" r="8" fill="#00843D" opacity="1"/><text x="236" y="172" text-anchor="middle" font-size="9" fill="#FFFFFF">✓</text><text x="252" y="172" font-size="10" font-weight="400" fill="#1A1D23">Propósito</text><line x1="236" y1="176" x2="236" y2="192" stroke="#E2E5EA"/><circle cx="236" cy="200" r="8" fill="#003DA5" opacity="1"/><text x="236" y="204" text-anchor="middle" font-size="9" fill="#FFFFFF">3</text><text x="252" y="204" font-size="10" font-weight="600" fill="#003DA5">Necesidad/oportunidad</text><line x1="236" y1="208" x2="236" y2="224" stroke="#E2E5EA"/><circle cx="236" cy="232" r="8" fill="#8B92A0" opacity="0.15"/><text x="236" y="236" text-anchor="middle" font-size="9" fill="#8B92A0">4</text><text x="252" y="236" font-size="10" font-weight="400" fill="#1A1D23">Alineación estratégica</text><line x1="236" y1="240" x2="236" y2="256" stroke="#E2E5EA"/><circle cx="236" cy="264" r="8" fill="#8B92A0" opacity="0.15"/><text x="236" y="268" text-anchor="middle" font-size="9" fill="#8B92A0">5</text><text x="252" y="268" font-size="10" font-weight="400" fill="#1A1D23">Descripción iniciativa</text><line x1="236" y1="272" x2="236" y2="288" stroke="#E2E5EA"/><circle cx="236" cy="296" r="8" fill="#8B92A0" opacity="0.15"/><text x="236" y="300" text-anchor="middle" font-size="9" fill="#8B92A0">6</text><text x="252" y="300" font-size="10" font-weight="400" fill="#1A1D23">Impacto económico</text><line x1="236" y1="304" x2="236" y2="320" stroke="#E2E5EA"/><circle cx="236" cy="328" r="8" fill="#8B92A0" opacity="0.15"/><text x="236" y="332" text-anchor="middle" font-size="9" fill="#8B92A0">7</text><text x="252" y="332" font-size="10" font-weight="400" fill="#1A1D23">Gestión del cambio</text><line x1="236" y1="336" x2="236" y2="352" stroke="#E2E5EA"/><circle cx="236" cy="360" r="8" fill="#8B92A0" opacity="0.15"/><text x="236" y="364" text-anchor="middle" font-size="9" fill="#8B92A0">8</text><text x="252" y="364" font-size="10" font-weight="400" fill="#1A1D23">Journey / hitos</text><line x1="236" y1="368" x2="236" y2="384" stroke="#E2E5EA"/><circle cx="236" cy="392" r="8" fill="#8B92A0" opacity="0.15"/><text x="236" y="396" text-anchor="middle" font-size="9" fill="#8B92A0">9</text><text x="252" y="396" font-size="10" font-weight="400" fill="#1A1D23">Equipo y sponsors G1</text><rect x="404" y="112" width="640" height="460" rx="10" fill="#FFFFFF" filter="url(#s)"/><text x="420" y="140" font-size="15" font-weight="600" fill="#1A1D23">3. Necesidad y/o oportunidad</text><text x="420" y="158" font-size="11" fill="#5A6070">Describir las principales necesidades, dolores u oportunidades para visibilizar el impacto.</text><text x="420" y="184" font-size="11" font-weight="500" fill="#5A6070">Síntesis de la necesidad/oportunidad</text><rect x="420" y="192" width="608" height="56" rx="8" fill="#F7F8FA" stroke="#E2E5EA"/><text x="432" y="212" font-size="11" fill="#1A1D23">Los pozos maduros del área norte presentan una pérdida</text><text x="432" y="228" font-size="11" fill="#1A1D23">progresiva de producción por falta de monitoreo predictivo.</text><text x="432" y="244" font-size="11" fill="#1A1D23">El mantenimiento reactivo genera costos innecesarios...</text><text x="420" y="274" font-size="11" font-weight="500" fill="#5A6070">Detalle de dolores / oportunidades</text><rect x="420" y="282" width="608" height="130" rx="8" fill="#F7F8FA" stroke="#E2E5EA"/><text x="428" y="300" font-size="8" font-weight="600" fill="#8B92A0" letter-spacing="0.3">STAKEHOLDER</text><text x="504" y="300" font-size="8" font-weight="600" fill="#8B92A0" letter-spacing="0.3">DOLOR / OPORTUNIDAD</text><text x="684" y="300" font-size="8" font-weight="600" fill="#8B92A0" letter-spacing="0.3">MÉTRICA</text><text x="754" y="300" font-size="8" font-weight="600" fill="#8B92A0" letter-spacing="0.3">INICIO</text><text x="814" y="300" font-size="8" font-weight="600" fill="#8B92A0" letter-spacing="0.3">TARGET</text><text x="874" y="300" font-size="8" font-weight="600" fill="#8B92A0" letter-spacing="0.3">PRIORIDAD</text><line x1="428" y1="306" x2="1004" y2="306" stroke="#E2E5EA"/><text x="428" y="322" font-size="10" fill="#1A1D23">Usuario</text><text x="504" y="322" font-size="10" fill="#5A6070">Interv. no planificadas</text><text x="684" y="322" font-size="10" fill="#5A6070">int/mes</text><text x="754" y="322" font-size="10" fill="#5A6070">12</text><text x="814" y="322" font-size="10" fill="#5A6070">4</text><text x="874" y="322" font-size="10" fill="#5A6070">Alta</text><text x="428" y="344" font-size="10" fill="#1A1D23">Sponsor</text><text x="504" y="344" font-size="10" fill="#5A6070">Costo de mantenimiento</text><text x="684" y="344" font-size="10" fill="#5A6070">USD/año</text><text x="754" y="344" font-size="10" fill="#5A6070">2.1M</text><text x="814" y="344" font-size="10" fill="#5A6070">1.5M</text><text x="874" y="344" font-size="10" fill="#5A6070">Media</text><text x="428" y="366" font-size="10" fill="#1A1D23">Interesado</text><text x="504" y="366" font-size="10" fill="#5A6070">Disp. datos campo</text><text x="684" y="366" font-size="10" fill="#5A6070">%</text><text x="754" y="366" font-size="10" fill="#5A6070">40%</text><text x="814" y="366" font-size="10" fill="#5A6070">95%</text><text x="874" y="366" font-size="10" fill="#5A6070">Media</text><text x="428" y="392" font-size="10" font-weight="500" fill="#003DA5">+ Agregar fila</text><text x="420" y="434" font-size="10" font-weight="500" fill="#5A6070">Historial de esta sección:</text><text x="420" y="450" font-size="10" fill="#8B92A0">J. García editó tabla de dolores — 12 abr 10:30</text><text x="420" y="466" font-size="10" fill="#8B92A0">M. López editó síntesis — 8 abr 15:20</text><rect x="764" y="560" width="80" height="34" rx="8" fill="#F7F8FA" stroke="#E2E5EA"/><text x="804" y="582" text-anchor="middle" font-size="11" font-weight="500" fill="#5A6070">Previsualizar</text><rect x="854" y="560" width="80" height="34" rx="8" fill="#C8102E" opacity="0.06"/><text x="894" y="582" text-anchor="middle" font-size="11" font-weight="500" fill="#C8102E">Generar PPTX</text><rect x="944" y="560" width="84" height="34" rx="8" fill="#003DA5"/><text x="986" y="582" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF">Enviar a aprob.</text></svg>