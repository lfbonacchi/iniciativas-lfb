<svg viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svgtitle">
<title id="svgtitle">PAE — Login y Selector de rol</title>
<desc>Mock SSO Microsoft y Selector de rol con botón demo</desc>
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
    text, tspan { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
  <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06" flood-color="#000"/>
  </filter>
  <filter id="shadow-md" x="-4%" y="-4%" width="108%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08" flood-color="#000"/>
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.04" flood-color="#000"/>
  </filter>
  <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#FAFBFC"/>
  </linearGradient>
  <linearGradient id="blueAccent" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#003DA5" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#003DA5" stop-opacity="0"/>
  </linearGradient>
</defs>
<!-- Background -->
<rect width="1400" height="700" fill="#F7F8FA" rx="0"/>
<!-- Panel SSO Microsoft -->
<rect x="20" y="20" width="640" height="660" rx="16" fill="#FFFFFF" filter="url(#shadow-md)"/>
<text x="40" y="50" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="1">PANTALLA 0 — MOCK SSO MICROSOFT</text>

<!-- Login Card -->
<rect x="160" y="100" width="360" height="460" rx="16" fill="#FFFFFF" filter="url(#shadow-md)"/>
<rect x="160" y="100" width="360" height="6" rx="3" fill="#003DA5"/>

<!-- Microsoft logo -->
<g transform="translate(320, 140)">
  <rect x="0" y="0" width="14" height="14" fill="#F25022" rx="1"/>
  <rect x="16" y="0" width="14" height="14" fill="#7FBA00" rx="1"/>
  <rect x="0" y="16" width="14" height="14" fill="#00A4EF" rx="1"/>
  <rect x="16" y="16" width="14" height="14" fill="#FFB900" rx="1"/>
</g>

<text x="340" y="190" text-anchor="middle" font-size="18" font-weight="600" fill="#1A1D23">Iniciar sesión</text>
<text x="340" y="212" text-anchor="middle" font-size="12" fill="#5A6070">Pan American Energy — Cuenta corporativa</text>

<!-- Email field -->
<text x="200" y="252" font-size="11" font-weight="500" fill="#5A6070">Correo electrónico</text>
<rect x="200" y="260" width="280" height="40" rx="8" fill="#F7F8FA" stroke="#E2E5EA" stroke-width="1"/>
<text x="216" y="285" font-size="12" fill="#8B92A0">nombre@pae.com</text>

<!-- Password field -->
<text x="200" y="320" font-size="11" font-weight="500" fill="#5A6070">Contraseña</text>
<rect x="200" y="328" width="280" height="40" rx="8" fill="#F7F8FA" stroke="#E2E5EA" stroke-width="1"/>
<text x="216" y="353" font-size="12" fill="#8B92A0">••••••••</text>

<!-- Button -->
<rect x="200" y="396" width="280" height="44" rx="8" fill="#003DA5"/>
<text x="340" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Ingresar con cuenta Microsoft</text>

<!-- Forgot -->
<text x="340" y="464" text-anchor="middle" font-size="11" fill="#003DA5" font-weight="500">¿Olvidaste tu contraseña?</text>

<!-- Flow arrow -->
<text x="340" y="584" text-anchor="middle" font-size="11" fill="#8B92A0">email @pae.com + pass</text>
<line x1="340" y1="594" x2="340" y2="620" stroke="#8B92A0" stroke-width="1" stroke-dasharray="4,3"/>
<text x="340" y="640" text-anchor="middle" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="0.8">VA A PANTALLA 1</text>
<!-- Panel Selector de Rol -->
<rect x="700" y="20" width="680" height="660" rx="16" fill="#FFFFFF" filter="url(#shadow-md)"/>
<text x="720" y="50" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="1">PANTALLA 1 — SELECTOR DE ROL (PROTOTIPO)</text>

<text x="1040" y="100" text-anchor="middle" font-size="18" font-weight="600" fill="#1A1D23">Seleccioná un rol para probar</text>
<text x="1040" y="122" text-anchor="middle" font-size="12" fill="#5A6070">Cada rol tiene su vista personalizada del portfolio</text>
<rect x="780" y="150" width="520" height="72" rx="10" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1"/>
<rect x="780" y="150" width="4" height="72" rx="2" fill="#003DA5"/>
<circle cx="810" cy="186" r="18" fill="#003DA5" opacity="0.1"/>
<text x="810" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#003DA5">JG</text>
<text x="840" y="174" font-size="14" font-weight="600" fill="#1A1D23">Ingresar como PO / Promotor</text>
<text x="840" y="192" font-size="11" fill="#5A6070">Juan García · jgarcia@pae.com</text>
<text x="840" y="208" font-size="10" fill="#003DA5" opacity="0.7" font-family="monospace">usr_po_001 — 3 iniciativas</text>
<text x="1260" y="190" font-size="11" font-weight="500" fill="#003DA5">Seleccionar →</text>
<rect x="780" y="236" width="520" height="72" rx="10" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1"/>
<rect x="780" y="236" width="4" height="72" rx="2" fill="#00843D"/>
<circle cx="810" cy="272" r="18" fill="#00843D" opacity="0.1"/>
<text x="810" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#00843D">AT</text>
<text x="840" y="260" font-size="14" font-weight="600" fill="#1A1D23">Ingresar como Business Owner</text>
<text x="840" y="278" font-size="11" fill="#5A6070">Ana Torres · atorres@pae.com</text>
<text x="840" y="294" font-size="10" fill="#00843D" opacity="0.7" font-family="monospace">usr_bo_001 — 5 iniciativas como BO</text>
<text x="1260" y="276" font-size="11" font-weight="500" fill="#003DA5">Seleccionar →</text>
<rect x="780" y="322" width="520" height="72" rx="10" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1"/>
<rect x="780" y="322" width="4" height="72" rx="2" fill="#C8102E"/>
<circle cx="810" cy="358" r="18" fill="#C8102E" opacity="0.1"/>
<text x="810" y="362" text-anchor="middle" font-size="11" font-weight="600" fill="#C8102E">RM</text>
<text x="840" y="346" font-size="14" font-weight="600" fill="#1A1D23">Ingresar como Sponsor / VP</text>
<text x="840" y="364" font-size="11" fill="#5A6070">Ricardo Méndez · rmendez@pae.com</text>
<text x="840" y="380" font-size="10" fill="#C8102E" opacity="0.7" font-family="monospace">usr_vp_001 — VP Upstream</text>
<text x="1260" y="362" font-size="11" font-weight="500" fill="#003DA5">Seleccionar →</text>
<rect x="780" y="408" width="520" height="72" rx="10" fill="#FFFFFF" stroke="#E2E5EA" stroke-width="1"/>
<rect x="780" y="408" width="4" height="72" rx="2" fill="#C8102E"/>
<circle cx="810" cy="444" r="18" fill="#C8102E" opacity="0.1"/>
<text x="810" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#C8102E">CR</text>
<text x="840" y="432" font-size="14" font-weight="600" fill="#1A1D23">Ingresar como Área Transformación</text>
<text x="840" y="450" font-size="11" fill="#5A6070">Carolina Ruiz · cruiz@pae.com</text>
<text x="840" y="466" font-size="10" fill="#C8102E" opacity="0.7" font-family="monospace">usr_at_001 — Todas las iniciativas</text>
<text x="1260" y="448" font-size="11" font-weight="500" fill="#003DA5">Seleccionar →</text>
<!-- Separator -->
<line x1="840" y1="504" x2="1020" y2="504" stroke="#E2E5EA" stroke-width="1"/>
<text x="1040" y="508" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="0.8">DEMO</text>
<line x1="1060" y1="504" x2="1240" y2="504" stroke="#E2E5EA" stroke-width="1"/>

<rect x="860" y="524" width="360" height="48" rx="10" fill="#003DA5"/>
<text x="1040" y="554" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">▶  Probar con demo</text>

<text x="1040" y="594" text-anchor="middle" font-size="12" fill="#5A6070">Carga datos de ejemplo</text>
<text x="1040" y="612" text-anchor="middle" font-size="12" fill="#5A6070">y entra como Área Transformación</text>

<!-- Flow arrow -->
<text x="1040" y="644" text-anchor="middle" font-size="11" fill="#8B92A0">Selecciona rol → carga seed</text>
<line x1="1040" y1="652" x2="1040" y2="672" stroke="#8B92A0" stroke-width="1" stroke-dasharray="4,3"/>
<text x="1040" y="688" text-anchor="middle" font-size="10" font-weight="600" fill="#8B92A0" letter-spacing="0.8">VA AL SHELL (PANTALLA 2)</text>
</svg>